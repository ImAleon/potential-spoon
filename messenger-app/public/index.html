<!DOCTYPE html>
<html>
<head>
  <title>Simple Messenger</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f2f5;
    }

    #chat {
      width: 400px;
      height: 500px;
      background: white;
      margin: 20px auto;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      padding: 8px 12px;
      margin: 5px;
      border-radius: 15px;
      max-width: 70%;
    }

    .me {
      background: #0084ff;
      color: white;
      margin-left: auto;
    }

    .other {
      background: #e4e6eb;
    }

    #inputBox {
      display: flex;
      border-top: 1px solid #ccc;
    }

    #inputBox input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    #inputBox button {
      background: #0084ff;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="chat">
  <div id="messages"></div>

  <div id="inputBox">
    <input type="text" id="messageInput" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// 🔥 YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyAxgfUilhG5BgI4PK4d2n1w3gdPopdf8S8",
  authDomain: "messenger-cc9b0.firebaseapp.com",
  databaseURL: "https://messenger-cc9b0-default-rtdb.firebaseio.com",
  projectId: "messenger-cc9b0",
  storageBucket: "messenger-cc9b0.firebasestorage.app",
  messagingSenderId: "718667910457",
  appId: "1:718667910457:web:d303969bce6e0a30c6ece8",
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Ask username
const username = prompt("Enter your name:");

const messagesRef = ref(db, "messages");

// Send message
window.sendMessage = function() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();

  if (text === "") return;

  push(messagesRef, {
    name: username,
    text: text
  });

  input.value = "";
};

// Receive messages
onChildAdded(messagesRef, (data) => {
  const msg = data.val();
  const div = document.createElement("div");

  div.classList.add("msg");
  div.classList.add(msg.name === username ? "me" : "other");

  div.textContent = msg.name + ": " + msg.text;

  document.getElementById("messages").appendChild(div);

  // Auto scroll
  document.getElementById("messages").scrollTop =
    document.getElementById("messages").scrollHeight;
});
</script>

</body>
</html>
